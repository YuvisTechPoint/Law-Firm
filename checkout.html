<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout — LexCounsel India</title>
  <link rel="icon" type="image/svg+xml" href="assets/logo.svg">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem 1rem;
      background: var(--bg-primary);
    }

    .checkout-wrapper {
      width: 100%;
      max-width: 1200px;
    }

    .checkout-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 3rem;
      padding: 1.5rem;
      background: var(--glass-bg);
      backdrop-filter: var(--glass-blur);
      border: var(--glass-border);
      border-radius: var(--radius-lg);
    }

    .logo-section {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .logo-section svg {
      width: 40px;
      height: 40px;
      color: var(--gold);
    }

    .logo-section a {
      color: var(--gold);
      font-size: 1.3rem;
      font-weight: 700;
      text-decoration: none;
      font-family: var(--font-display);
    }

    .checkout-content {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
    }

    /* Order Summary */
    .order-summary {
      background: var(--glass-bg);
      backdrop-filter: var(--glass-blur);
      border: var(--glass-border);
      border-radius: var(--radius-lg);
      padding: 2rem;
    }

    .order-summary h2 {
      margin-top: 0;
      font-family: var(--font-display);
      font-size: 1.8rem;
      margin-bottom: 1.5rem;
    }

    .order-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.5rem;
      background: var(--bg-card);
      border-radius: var(--radius-md);
      border: 1px solid var(--border);
      margin-bottom: 1rem;
    }

    .order-item-info h4 {
      margin: 0 0 0.5rem 0;
      color: var(--ivory);
      font-size: 1.1rem;
    }

    .order-item-info p {
      margin: 0;
      color: var(--muted);
      font-size: 0.85rem;
    }

    .order-item-price {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--gold);
    }

    .order-summary-box {
      background: var(--bg-card);
      padding: 1.5rem;
      border-radius: var(--radius-md);
      border: 1px solid var(--border);
      margin-top: 2rem;
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 1rem;
      font-size: 0.95rem;
    }

    .summary-total {
      display: flex;
      justify-content: space-between;
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--gold);
      border-top: 1px solid var(--border);
      padding-top: 1rem;
      margin-top: 1rem;
    }

    /* Payment Details */
    .payment-section {
      background: var(--glass-bg);
      backdrop-filter: var(--glass-blur);
      border: var(--glass-border);
      border-radius: var(--radius-lg);
      padding: 2rem;
      display: flex;
      flex-direction: column;
    }

    .payment-section h2 {
      margin-top: 0;
      font-family: var(--font-display);
      font-size: 1.8rem;
      margin-bottom: 1.5rem;
    }

    .billing-details {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .form-group {
      display: flex;
      flex-direction: column;
    }

    .form-group label {
      margin-bottom: 0.5rem;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .form-control {
      padding: 0.85rem 1rem;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      color: var(--ivory);
      font-size: 0.95rem;
      transition: all var(--transition-base);
    }

    .form-control:focus {
      outline: none;
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.15);
      background: var(--bg-primary);
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .secure-badge {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
      padding: 1rem;
      background: rgba(46, 204, 113, 0.1);
      border: 1px solid var(--success);
      border-radius: var(--radius-md);
      color: var(--success);
      font-size: 0.9rem;
      font-weight: 600;
    }

    .secure-badge svg {
      width: 20px;
      height: 20px;
    }

    .payment-method {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .payment-method label {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: all var(--transition-base);
    }

    .payment-method label:hover {
      border-color: var(--gold);
    }

    .payment-method input[type="radio"] {
      accent-color: var(--gold);
      cursor: pointer;
    }

    .btn-pay {
      width: 100%;
      padding: 1.2rem;
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      color: var(--bg-primary);
      border: none;
      border-radius: var(--radius-md);
      font-weight: 700;
      font-size: 1.1rem;
      cursor: pointer;
      transition: all var(--transition-base);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-top: auto;
    }

    .btn-pay:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-gold-lg);
    }

    .btn-pay:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .empty-cart {
      grid-column: 1 / -1;
      text-align: center;
      padding: 3rem 2rem;
    }

    .empty-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
    }

    .empty-cart h3 {
      color: var(--muted);
      margin-bottom: 1rem;
    }

    .empty-cart p {
      color: var(--muted);
      margin-bottom: 2rem;
    }

    .btn-back {
      background: transparent;
      color: var(--gold);
      padding: 0.75rem 1.5rem;
      border: 1px solid var(--gold);
      border-radius: var(--radius-md);
      cursor: pointer;
      font-weight: 600;
      transition: all var(--transition-base);
    }

    .btn-back:hover {
      background: var(--gold);
      color: var(--bg-primary);
    }

    .status-message {
      padding: 1rem;
      border-radius: var(--radius-md);
      margin-bottom: 1rem;
      font-size: 0.9rem;
      text-align: center;
      display: none;
    }

    .status-message.success {
      background: rgba(46, 204, 113, 0.1);
      color: var(--success);
      border: 1px solid var(--success);
    }

    .status-message.error {
      background: rgba(231, 76, 60, 0.1);
      color: #e74c3c;
      border: 1px solid #e74c3c;
    }

    @media (max-width: 1024px) {
      .checkout-content {
        grid-template-columns: 1fr;
      }

      .checkout-header {
        flex-direction: column;
        gap: 1rem;
      }
    }
  </style>
</head>
<body>

<div class="checkout-wrapper">
  <!-- Header -->
  <div class="checkout-header">
    <div class="logo-section">
      <svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M18 3L4 10v8c0 7 6 13.5 14 16 8-2.5 14-9 14-16v-8L18 3z" stroke="currentColor" stroke-width="1.5" fill="none"/>
        <line x1="18" y1="8" x2="18" y2="28" stroke="currentColor" stroke-width="1.5"/>
        <line x1="9" y1="17" x2="27" y2="17" stroke="currentColor" stroke-width="1.5"/>
      </svg>
      <a href="index.html">LexCounsel India</a>
    </div>
    <a href="login.html" class="btn-back">← Back to Dashboard</a>
  </div>

  <!-- Main Content -->
  <div class="checkout-content">
    <!-- Order Summary -->
    <div class="order-summary">
      <h2>Order Summary</h2>
      <div id="order-items"></div>
      <div class="order-summary-box">
        <div class="summary-row">
          <span>Subtotal:</span>
          <span id="subtotal">₹0</span>
        </div>
        <div class="summary-row">
          <span>GST (18%):</span>
          <span id="gst-amount">₹0</span>
        </div>
        <div class="summary-total">
          <span>Total Amount:</span>
          <span id="total-amount">₹0</span>
        </div>
      </div>
    </div>

    <!-- Payment Section -->
    <div class="payment-section">
      <h2>Payment Details</h2>

      <div id="status-message" class="status-message"></div>

      <div class="secure-badge">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
          <polyline points="10 19 12 21 16 17"></polyline>
        </svg>
        <span>Secure payment powered by Razorpay</span>
      </div>

      <div class="billing-details">
        <div class="form-row">
          <div class="form-group">
            <label>Full Name *</label>
            <input type="text" class="form-control" id="customer-name" placeholder="Your full name" required>
          </div>
          <div class="form-group">
            <label>Email *</label>
            <input type="email" class="form-control" id="customer-email" placeholder="your@email.com" required>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Phone *</label>
            <input type="tel" class="form-control" id="customer-phone" placeholder="+91 XXXXX XXXXX" required>
          </div>
          <div class="form-group">
            <label>City</label>
            <input type="text" class="form-control" id="customer-city" placeholder="Your city">
          </div>
        </div>
      </div>

      <div class="payment-method">
        <label>
          <input type="radio" name="payment-method" value="card" checked>
          <div>
            <strong>💳 Debit / Credit Card</strong>
            <p style="margin: 0; color: var(--muted); font-size: 0.8rem;">Visa, Mastercard, American Express</p>
          </div>
        </label>
        <label>
          <input type="radio" name="payment-method" value="upi">
          <div>
            <strong>📱 UPI</strong>
            <p style="margin: 0; color: var(--muted); font-size: 0.8rem;">Google Pay, PhonePe, Paytm</p>
          </div>
        </label>
        <label>
          <input type="radio" name="payment-method" value="netbanking">
          <div>
            <strong>🏦 Net Banking</strong>
            <p style="margin: 0; color: var(--muted); font-size: 0.8rem;">All major banks supported</p>
          </div>
        </label>
      </div>

      <button class="btn-pay" id="pay-btn" onclick="processPayment()">Pay Now</button>
    </div>
  </div>
</div>

<script>
  const RAZORPAY_KEY = 'rzp_test_SfTBR0XRUt3eHw';

  let cart = JSON.parse(localStorage.getItem('userCart')) || [];
  let userEmail = localStorage.getItem('userEmail') || '';
  let userFullName = localStorage.getItem('userFullName') || '';

  // Verify user is logged in
  window.addEventListener('DOMContentLoaded', () => {
    if (!userEmail) {
      window.location.href = 'login.html';
      return;
    }

    // Pre-fill customer details
    document.getElementById('customer-email').value = userEmail;
    document.getElementById('customer-name').value = userFullName;

    if (cart.length === 0) {
      document.querySelector('.checkout-content').innerHTML = `
        <div class="empty-cart">
          <div class="empty-icon">🛒</div>
          <h3>Your Cart is Empty</h3>
          <p>Add some consultation services to proceed with checkout</p>
          <a href="login.html" class="btn-back" style="display: inline-block; padding: 0.85rem 1.5rem;">← Go Back to Dashboard</a>
        </div>
      `;
      return;
    }

    renderOrderSummary();
  });

  function renderOrderSummary() {
    const orderItems = document.getElementById('order-items');
    let subtotal = 0;

    orderItems.innerHTML = cart.map(item => {
      subtotal += item.price;
      return `
        <div class="order-item">
          <div class="order-item-info">
            <h4>${item.name}</h4>
            <p>${item.description}</p>
            <p style="font-size: 0.8rem; margin-top: 0.3rem;">Duration: ${item.duration}</p>
          </div>
          <div class="order-item-price">₹${item.price}</div>
        </div>
      `;
    }).join('');

    const gst = Math.round(subtotal * 0.18);
    const total = subtotal + gst;

    document.getElementById('subtotal').textContent = `₹${subtotal}`;
    document.getElementById('gst-amount').textContent = `₹${gst}`;
    document.getElementById('total-amount').textContent = `₹${total}`;
  }

  function processPayment() {
    const name = document.getElementById('customer-name').value.trim();
    const email = document.getElementById('customer-email').value.trim();
    const phone = document.getElementById('customer-phone').value.trim();

    if (!name || !email || !phone) {
      showStatus('Please fill all required fields', 'error');
      return;
    }

    const subtotal = cart.reduce((sum, item) => sum + item.price, 0);
    const gst = Math.round(subtotal * 0.18);
    const total = subtotal + gst;

    if (total === 0) {
      // Free consultation
      showStatus('✓ Booking confirmed! Redirecting...', 'success');
      setTimeout(() => {
        localStorage.removeItem('userCart');
        window.location.href = 'login.html?booking=success';
      }, 2000);
      return;
    }

    const payBtn = document.getElementById('pay-btn');
    payBtn.disabled = true;
    payBtn.textContent = 'Processing...';

    const options = {
      key: RAZORPAY_KEY,
      amount: Math.round(total * 100), // in paise
      currency: 'INR',
      name: 'LexCounsel India',
      description: `${cart.length} consultation(s)`,
      prefill: {
        name: name,
        email: email,
        contact: phone
      },
      handler: function (response) {
        handlePaymentSuccess(response, name, email, phone, total);
      },
      modal: {
        ondismiss: function () {
          showStatus('Payment cancelled', 'error');
          payBtn.disabled = false;
          payBtn.textContent = 'Pay Now';
        }
      },
      theme: {
        color: '#D4AF37'
      }
    };

    const rzp = new Razorpay(options);
    rzp.open();
  }

  function handlePaymentSuccess(response, name, email, phone, amount) {
    showStatus('✓ Payment successful! Processing booking...', 'success');

    // Store booking details
    const booking = {
      id: response.razorpay_payment_id,
      orderId: response.razorpay_order_id,
      signature: response.razorpay_signature,
      customer: { name, email, phone },
      items: cart,
      amount: amount,
      date: new Date().toLocaleString(),
      status: 'confirmed'
    };

    let bookings = JSON.parse(localStorage.getItem('userBookings')) || [];
    bookings.push(booking);
    localStorage.setItem('userBookings', JSON.stringify(bookings));
    localStorage.removeItem('userCart');

    setTimeout(() => {
      window.location.href = `success.html?orderId=${response.razorpay_payment_id}`;
    }, 2000);
  }

  function showStatus(message, type) {
    const statusMsg = document.getElementById('status-message');
    statusMsg.textContent = message;
    statusMsg.className = `status-message ${type}`;
    statusMsg.style.display = 'block';
  }
</script>

</body>
</html>
